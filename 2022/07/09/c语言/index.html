    <h2 id="for，-while，-do-while三种循环"><a href="#for，-while，-do-while三种循环" class="headerlink" title="for， while， do while三种循环"></a>for， while， do while三种循环</h2><!-- 最近复习c语言，发觉for，while, do while 三种循环的细节没有弄清楚
现在来梳理一下

一.相同点：

1.都遵循循环四要素，初始化循环变量、循环条件、循环体、更新循环变量。

二.不同点：

1.while 和 do-while 一般用于循环次数不确定的业务场景；for 一般用于循环次数确定的场景。

2.while 和 for 都是先判断循环条件，再执行循环体；do-while 先执行循环体，再判断循环条件。
（注：for 循环只适用于循环次数确定的场景下(for 也可以适用于循环次数不确定的场景，只不过一般不会用这种方式进行开发)，while 和 do-while 循环次数确定或者不确定都可以使用。） -->
